<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Host Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Manrope", "ui-sans-serif", "system-ui"],
              display: ["Space Grotesk", "Manrope", "ui-sans-serif", "system-ui"],
            },
            boxShadow: {
              premium: "0 20px 50px -24px rgba(2, 8, 23, 0.7)",
            },
            keyframes: {
              fadeUp: {
                "0%": { opacity: "0", transform: "translateY(8px)" },
                "100%": { opacity: "1", transform: "translateY(0)" },
              },
            },
            animation: {
              fadeUp: "fadeUp 400ms ease-out",
            },
          },
        },
      };
    </script>
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
    />
    <style>
      #chat::-webkit-scrollbar { width: 8px; }
      #chat::-webkit-scrollbar-thumb { background: #334155; border-radius: 999px; }
    </style>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
    <div class="pointer-events-none fixed inset-0 bg-[radial-gradient(circle_at_12%_15%,rgba(20,184,166,0.16),transparent_40%),radial-gradient(circle_at_88%_4%,rgba(59,130,246,0.2),transparent_32%),linear-gradient(180deg,#020617,#0f172a_45%,#111827)]"></div>

    <main class="relative mx-auto grid w-full max-w-7xl grid-cols-1 gap-4 px-4 py-4 sm:px-6 lg:grid-cols-[1.55fr_1fr] lg:py-6">
      <section class="space-y-4">
        <header class="rounded-2xl border border-slate-700/70 bg-slate-900/65 p-5 shadow-premium backdrop-blur-xl">
          <p class="mb-2 inline-flex rounded-full border border-cyan-400/30 bg-cyan-400/10 px-3 py-1 text-[11px] font-semibold uppercase tracking-[0.2em] text-cyan-300">Host Panel</p>
          <h1 class="font-display text-2xl font-bold tracking-tight text-white sm:text-3xl">Live Session Control</h1>
          <p id="meta" class="mt-3 inline-flex rounded-full border border-slate-700 bg-slate-900 px-3 py-1.5 text-xs text-slate-300"></p>
        </header>

        <div id="startClassForm" class="rounded-2xl border border-slate-700/70 bg-slate-900/60 p-5 shadow-premium backdrop-blur-xl">
          <h2 class="font-display text-xl font-semibold text-white">Go Live</h2>
          <div class="mt-4 grid gap-3">
            <input id="hostName" placeholder="Your name" required class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-emerald-400/70 focus:shadow-[0_0_0_4px_rgba(16,185,129,0.2)]" />
            <input id="title" placeholder="Session title" required class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-emerald-400/70 focus:shadow-[0_0_0_4px_rgba(16,185,129,0.2)]" />
            <input id="youtubeUrl" placeholder="https://www.youtube.com/watch?v=..." required class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-emerald-400/70 focus:shadow-[0_0_0_4px_rgba(16,185,129,0.2)]" />
          </div>
          <p class="mt-3 text-sm text-slate-400">Session starts automatically when a valid YouTube link is added.</p>
        </div>

        <div id="doubtRoomCard" class="hidden rounded-2xl border border-slate-700/70 bg-slate-900/60 p-5 shadow-premium backdrop-blur-xl animate-fadeUp">
          <div class="mb-3 flex flex-wrap items-center justify-between gap-2">
            <h2 class="font-display text-xl font-semibold text-white">Doubt Room</h2>
            <p id="breakoutInfo" class="rounded-full border border-emerald-400/30 bg-emerald-400/10 px-3 py-1 text-xs font-semibold text-emerald-300"></p>
          </div>
          <p class="text-sm text-slate-400">Starts automatically with session and auto-closes after inactivity.</p>

          <button id="closeDoubtBtn" type="button" class="hidden mt-4 inline-flex items-center justify-center rounded-xl bg-gradient-to-r from-rose-500 to-red-600 px-4 py-2.5 text-sm font-semibold text-white transition hover:brightness-110 active:scale-[0.99]">
            Close Doubt Room
          </button>

          <div id="hostDoubtEmbedWrap" class="hidden mt-4 overflow-hidden rounded-xl border border-slate-700 bg-slate-950">
            <iframe
              id="hostDoubtFrame"
              allow="camera *; microphone *; display-capture *; autoplay *; fullscreen *"
              referrerpolicy="strict-origin-when-cross-origin"
              class="w-full aspect-video"
            ></iframe>
          </div>

          <div id="breakoutLinkWrap" class="hidden mt-4 grid grid-cols-1 gap-2 sm:grid-cols-[1fr_auto]">
            <a id="breakoutLink" target="_blank" rel="noreferrer" class="truncate rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-cyan-300 hover:text-cyan-200">Open Doubt Room</a>
            <button id="copyBreakoutBtn" type="button" class="rounded-xl bg-slate-800 px-4 py-2 text-sm font-semibold text-slate-100 transition hover:bg-slate-700">Copy Link</button>
          </div>
        </div>

        <button id="endBtn" class="inline-flex w-full items-center justify-center rounded-xl bg-gradient-to-r from-rose-500 to-red-600 px-4 py-3 text-sm font-bold text-white transition hover:brightness-110 active:scale-[0.99]">
          End Session
        </button>
      </section>

      <aside class="space-y-4">
        <section class="rounded-2xl border border-slate-700/70 bg-slate-900/60 p-5 shadow-premium backdrop-blur-xl">
          <h2 class="font-display text-xl font-semibold text-white">Request Queue</h2>
          <ul id="queue" class="mt-3 space-y-2"></ul>
        </section>

        <section class="rounded-2xl border border-slate-700/70 bg-slate-900/60 p-5 shadow-premium backdrop-blur-xl">
          <h2 class="font-display text-xl font-semibold text-white">Chat / Q&A</h2>
          <div id="chat" class="mt-3 h-[380px] overflow-y-auto rounded-xl border border-slate-700 bg-slate-950/70 p-3"></div>
          <form id="chatForm" class="mt-3 space-y-2">
            <input id="chatInput" placeholder="Send announcement or answer" required class="w-full rounded-xl border border-slate-600 bg-slate-900 px-4 py-3 text-sm text-slate-100 outline-none transition placeholder:text-slate-500 focus:border-cyan-400/70 focus:shadow-[0_0_0_4px_rgba(34,211,238,0.18)]" />
            <button type="submit" class="w-full rounded-xl bg-gradient-to-r from-cyan-500 to-blue-500 px-4 py-2.5 text-sm font-semibold text-slate-950 transition hover:brightness-110 active:scale-[0.99]">Send</button>
          </form>
        </section>
      </aside>
    </main>

    <script src="/socket.io/socket.io.js"></script>
    <script src="/utils.js"></script>
    <script>
      const classId = getRequiredQuery("classId");
      const socket = io();
      const teacher = {
        userId: `teacher-${Math.random().toString(36).slice(2, 8)}`,
        name: "Host",
        role: "teacher",
      };

      const meta = document.getElementById("meta");
      const queueEl = document.getElementById("queue");
      const chatEl = document.getElementById("chat");
      const breakoutInfo = document.getElementById("breakoutInfo");
      const breakoutLinkWrap = document.getElementById("breakoutLinkWrap");
      const breakoutLink = document.getElementById("breakoutLink");
      const copyBreakoutBtn = document.getElementById("copyBreakoutBtn");
      const closeDoubtBtn = document.getElementById("closeDoubtBtn");
      const hostDoubtEmbedWrap = document.getElementById("hostDoubtEmbedWrap");
      const hostDoubtFrame = document.getElementById("hostDoubtFrame");
      const doubtRoomCard = document.getElementById("doubtRoomCard");
      let youtubeWarningEl = null;

      const startClassForm = document.getElementById("startClassForm");
      const hostNameInput = document.getElementById("hostName");
      const titleInput = document.getElementById("title");
      const youtubeUrlInput = document.getElementById("youtubeUrl");
      const endBtn = document.getElementById("endBtn");
      const chatForm = document.getElementById("chatForm");
      const chatInput = document.getElementById("chatInput");
      let autoStartTimer = null;
      let isStarting = false;
      let lastStartedUrl = "";
      let hasPendingDoubt = false;
      let isDoubtRoomActive = false;
      let activeDoubtRoom = null;
      let sessionEnded = false;

      const rememberedHostName = window.localStorage.getItem("host_name") || "";
      if (rememberedHostName) {
        hostNameInput.value = rememberedHostName;
      }

      function withJoinIdentity(url, name) {
        if (!url) return "#";
        try {
          const parsed = new URL(url);
          if (name?.trim()) parsed.searchParams.set("name", name.trim());
          parsed.searchParams.set("audio", "1");
          parsed.searchParams.set("video", "0");
          return parsed.toString();
        } catch (_err) {
          return url;
        }
      }

      function refreshDoubtRoomVisibility() {
        const shouldShow = hasPendingDoubt || isDoubtRoomActive;
        doubtRoomCard.classList.toggle("hidden", !shouldShow);
      }

      function applyActiveDoubtRoom(room) {
        activeDoubtRoom = room || null;
        isDoubtRoomActive = Boolean(activeDoubtRoom);
        closeDoubtBtn.classList.toggle("hidden", !isDoubtRoomActive);
        closeDoubtBtn.disabled = sessionEnded;
        breakoutInfo.textContent = activeDoubtRoom
          ? `Active${activeDoubtRoom.participantName ? ` with ${activeDoubtRoom.participantName}` : ""}`
          : "Inactive";

        if (activeDoubtRoom?.url) {
          const hostJoinUrl = withJoinIdentity(activeDoubtRoom.url, hostNameInput.value);
          breakoutLinkWrap.classList.remove("hidden");
          breakoutLink.href = activeDoubtRoom.url;
          hostDoubtEmbedWrap.classList.remove("hidden");
          hostDoubtFrame.src = hostJoinUrl;
        } else {
          breakoutLinkWrap.classList.add("hidden");
          breakoutLink.href = "#";
          hostDoubtEmbedWrap.classList.add("hidden");
          hostDoubtFrame.src = "about:blank";
        }

        refreshDoubtRoomVisibility();
      }

      function setSessionEndedState(ended) {
        sessionEnded = Boolean(ended);
        hostNameInput.disabled = sessionEnded;
        titleInput.disabled = sessionEnded;
        youtubeUrlInput.disabled = sessionEnded;
        chatInput.disabled = sessionEnded;
        closeDoubtBtn.disabled = sessionEnded;
        endBtn.disabled = sessionEnded;
        endBtn.classList.toggle("opacity-60", sessionEnded);
        endBtn.textContent = sessionEnded ? "Session Ended" : "End Session";
      }

      function renderQueue(items) {
        queueEl.innerHTML = "";
        const pending = items.filter((x) => x.status === "pending");
        hasPendingDoubt = pending.length > 0;
        refreshDoubtRoomVisibility();
        if (!pending.length) {
          queueEl.innerHTML = '<li class="rounded-xl border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-400">No pending requests</li>';
          return;
        }

        pending.forEach((item) => {
          const li = document.createElement("li");
          li.className = "rounded-xl border border-slate-700 bg-slate-900/80 p-3";
          li.innerHTML = `
            <div class="mb-2 flex items-center justify-between gap-2">
              <strong class="text-sm font-semibold text-white">${item.name}</strong>
              <span class="text-[11px] text-slate-400">Pending</span>
            </div>
            <div class="grid grid-cols-2 gap-2">
              <button data-action="accept" data-id="${item.userId}" class="rounded-lg bg-emerald-500 px-3 py-2 text-xs font-semibold text-slate-950 transition hover:brightness-110">Allow</button>
              <button data-action="reject" data-id="${item.userId}" class="rounded-lg bg-slate-700 px-3 py-2 text-xs font-semibold text-slate-100 transition hover:bg-slate-600">Skip</button>
            </div>
          `;
          queueEl.appendChild(li);
        });
      }

      function appendChat(message) {
        const row = document.createElement("div");
        row.className = "mb-2 rounded-lg border border-slate-800 bg-slate-900/80 p-2.5";
        row.innerHTML = `
          <div class="flex items-center justify-between gap-2">
            <strong class="text-sm font-semibold text-slate-100">${message.name}</strong>
            <span class="text-[11px] text-slate-500">${new Date(message.ts).toLocaleTimeString()}</span>
          </div>
          <p class="mt-1 text-sm text-slate-300">${message.message}</p>
        `;
        chatEl.appendChild(row);
        chatEl.scrollTop = chatEl.scrollHeight;
      }

      function applyClassState(state) {
        meta.textContent = `Class ID: ${state.id} | Status: ${state.status} | Participants: ${state.participantCount}`;
        setSessionEndedState(state.status === "ended");
        renderQueue(state.handRaiseQueue || []);

        if (state.youtubeUrl) {
          const embedUrl = toYouTubeEmbedUrl(state.youtubeUrl);
          if (embedUrl) {
            if (youtubeWarningEl) {
              youtubeWarningEl.remove();
              youtubeWarningEl = null;
            }
          } else {
            if (!youtubeWarningEl) {
              youtubeWarningEl = document.createElement("p");
              youtubeWarningEl.className =
                "mt-3 rounded-lg border border-amber-500/30 bg-amber-500/10 px-3 py-2 text-xs font-semibold text-amber-300";
              youtubeWarningEl.textContent =
                "This YouTube link cannot be embedded. Use a watch/live URL that contains a video ID.";
              startClassForm.appendChild(youtubeWarningEl);
            }
          }
        }

        if (sessionEnded) {
          hasPendingDoubt = false;
          applyActiveDoubtRoom(null);
        } else {
          applyActiveDoubtRoom(activeDoubtRoom);
        }

        chatEl.innerHTML = "";
        (state.chat || []).forEach(appendChat);
      }

      async function startSession() {
        const hostName = hostNameInput.value.trim();
        const title = titleInput.value.trim();
        const youtubeUrl = youtubeUrlInput.value.trim();
        if (!hostName) {
          hostNameInput.focus();
          return;
        }
        if (!youtubeUrl || youtubeUrl === lastStartedUrl || isStarting) return;

        window.localStorage.setItem("host_name", hostName);

        isStarting = true;

        const res = await fetch(`/api/classes/${classId}/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title, youtubeUrl, hostName }),
        });

        const data = await res.json();
        isStarting = false;
        if (!res.ok) {
          alert(data.error || "Could not start session");
          return;
        }
        lastStartedUrl = youtubeUrl;
        applyClassState(data);
      }

      function scheduleAutoStart() {
        if (autoStartTimer) clearTimeout(autoStartTimer);
        autoStartTimer = setTimeout(() => {
          startSession();
        }, 500);
      }

      youtubeUrlInput.addEventListener("input", scheduleAutoStart);
      youtubeUrlInput.addEventListener("change", scheduleAutoStart);
      youtubeUrlInput.addEventListener("blur", scheduleAutoStart);

      document.getElementById("endBtn").addEventListener("click", async () => {
        const res = await fetch(`/api/classes/${classId}/end`, { method: "POST" });
        const data = await res.json();
        if (res.ok) applyClassState(data);
      });

      closeDoubtBtn.addEventListener("click", () => {
        socket.emit("breakout:close");
      });

      queueEl.addEventListener("click", (e) => {
        if (sessionEnded) return;
        const target = e.target;
        if (!(target instanceof HTMLButtonElement)) return;
        socket.emit("hand-raise:resolve", {
          userId: target.dataset.id,
          action: target.dataset.action,
        });
      });

      chatForm.addEventListener("submit", (e) => {
        e.preventDefault();
        if (sessionEnded) return;
        socket.emit("chat:send", { message: chatInput.value });
        chatInput.value = "";
      });

      socket.on("connect", () => {
        socket.emit("join:class", { classId, ...teacher });
      });

      socket.on("class:updated", applyClassState);
      socket.on("queue:updated", renderQueue);
      socket.on("chat:message", appendChat);
      socket.on("breakout:updated", (room) => {
        if (sessionEnded) return;
        applyActiveDoubtRoom(room);
      });

      socket.on("session:ended", () => {
        setSessionEndedState(true);
        hasPendingDoubt = false;
        renderQueue([]);
        applyActiveDoubtRoom(null);
      });

      copyBreakoutBtn.addEventListener("click", async () => {
        const url = breakoutLink.href;
        if (!url || url === "#") return;

        try {
          await navigator.clipboard.writeText(url);
          copyBreakoutBtn.textContent = "Copied";
          setTimeout(() => {
            copyBreakoutBtn.textContent = "Copy Link";
          }, 1200);
        } catch (_err) {
          copyBreakoutBtn.textContent = "Copy failed";
          setTimeout(() => {
            copyBreakoutBtn.textContent = "Copy Link";
          }, 1200);
        }
      });

      fetch(`/api/classes/${classId}`)
        .then((r) => r.json())
        .then((data) => {
          if (data.error) return;
          applyClassState(data);
          titleInput.value = data.title;
          if (!hostNameInput.value.trim()) {
            hostNameInput.value = window.localStorage.getItem("host_name") || "Host";
          }
          if (data.youtubeUrl) {
            youtubeUrlInput.value = data.youtubeUrl;
            lastStartedUrl = data.youtubeUrl;
          }
        });
    </script>
  </body>
</html>
