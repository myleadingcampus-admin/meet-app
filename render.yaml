services:
  - type: web
    name: live-session-module
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: BREAKOUT_AUTO_CLOSE_MS
        value: 600000
